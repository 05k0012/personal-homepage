<h1>Contact</h1>
<form id="contactForm">
  <label>Your email:</label><br>
  <input type="email" id="email" required style="width: 100%; margin-bottom: 10px;"><br>
  <label>Message:</label><br>
  <textarea id="message" required style="width: 100%; height: 150px;"></textarea><br>
  <button type="submit">Send</button>
</form>
<script>
  // Base64 encoded email (replace with yours)
  const encoded = "eW91cm5hbWVAZ21haWwuY29t";
  function decodeEmail() {
    return atob(encoded);
  }
  document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const sender = document.getElementById("email").value;
    const message = document.getElementById("message").value;
    const email = decodeEmail();
    const subject = encodeURIComponent("Personal Homepage Contact");
    const body = encodeURIComponent("From: " + sender + "\n\n" + message);
    window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
  });
</script>
