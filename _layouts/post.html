---
layout: default
---
<h1>{{ page.title }}</h1>
<p><em>{{ page.date | date: "%B %d, %Y" }}</em></p>
{% if page.images %}
  <div style="display: flex; gap: 10px; overflow-x: auto;">
    {% for img in page.images %}
      <img src="{{ img }}" style="height: 250px; border-radius: 10px;">
    {% endfor %}
  </div>
{% endif %}
<div style="margin-top: 20px;">
  {{ content }}
</div>
