---
layout: default
---
<h1>All About Me - Andrew Jordan</h1>
<p>
Welcome! This mostly going to be about cooking. 
</p>
<div class="grid">
  {% for post in site.posts %}
    {% if post.images %}
      <div class="post-card">
        <a href="{{ post.url }}">
          <img src="{{ post.images[0] }}" alt="{{ post.title }}">
        </a>
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
      </div>
    {% else %}
      <div class="post-card">
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        <p>{{ post.excerpt }}</p>
      </div>
    {% endif %}
  {% endfor %}
</div>
