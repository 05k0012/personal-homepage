---
layout: default
---
<h1>Personal Homepage</h1>
<p>
Welcome! This is my personal homepage where I share my thoughts, projects, and interests.
</p>
<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px;">
  {% for post in site.posts %}
    <div>
      <a href="{{ post.url }}">
        <img src="{{ post.images[0] }}" style="width: 100%; height: 200px; object-fit: cover;">
      </a>
      <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
    </div>
  {% endfor %}
</div>
